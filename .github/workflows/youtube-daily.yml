name: 유튜브 구독자 일별 기록

on:
  schedule:
    # 매일 UTC 00:10 = 한국시간(KST) 오전 9:10 에 실행
    - cron: '10 0 * * *'
  workflow_dispatch:   # 수동 실행 버튼도 추가

permissions:
  contents: write       # CSV 커밋하려면 쓰기 권한 필요

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 구독자 수 기록
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_youtube_subs.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add youtube_subs.csv
          git diff --staged --quiet || git commit -m "구독자 자동 기록 $(date +%Y-%m-%d)"
          git push
